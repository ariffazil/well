name: "Copilot Setup Steps — WELL"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    name: "WELL — Pre-install human readiness organ dependencies"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install WELL dependencies
        run: pip install -e . -q
      - name: Verify server.py imports
        run: python3 -c "import server; print('[PASS] WELL server loaded')" || python3 -c "import importlib.util; spec=importlib.util.spec_from_file_location('server','server.py'); mod=importlib.util.module_from_spec(spec); print('[PASS] WELL server.py parseable')"
        env:
          ARIFOS_ENV: ci
          WELL_STATE_PATH: /tmp/well-state-ci.json
