name: WELL CI — Build Validation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: well-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Build-only validation. GHCR push is handled autonomously by VPS deploy-vps.sh
      # because GITHUB_TOKEN cannot push to GHCR packages created via PAT (403 Forbidden).
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: |
            ghcr.io/ariffazil/well:${{ steps.vars.outputs.short_sha }}
            ghcr.io/ariffazil/well:latest
