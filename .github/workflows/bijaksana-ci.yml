# BIJAKSANA CI — Physics-Grounded Intelligence Gate
# Every push: ΔS ≤ 0, Φ ≥ 0.90, Ψ = MANIFEST, Ω = LOCKED
#
# ΔS = entropy delta (dead code, unused imports, TODOs)
# Φ  = clarity score (ruff pass rate)
# Ψ  = truth (surface = manifest)
# Ω  = governance (no self-auth, no creep)

name: BIJAKSANA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  measure:
    name: "ΔS Φ Ψ Ω"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install ruff -q

      - name: "ΔS — Entropy"
        id: ds
        run: |
          # Dead signals: unused imports, bare TODOs, f-strings without placeholders
          F401=$(ruff check --select F401 --output-format json . 2>/dev/null | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo 0)
          F541=$(ruff check --select F541 --output-format json . 2>/dev/null | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo 0)
          TODO=$(grep -r "TODO\|FIXME\|HACK" --include="*.py" . 2>/dev/null | wc -l)
          DS=$((F401 + F541 + TODO))
          echo "value=$DS" >> $GITHUB_OUTPUT
          echo "ΔS = F401($F401) + F541($F541) + TODO($TODO) = $DS"

      - name: "Φ — Clarity"
        id: phi
        run: |
          TOTAL=$(ruff check --statistics . 2>/dev/null | wc -l || echo 1)
          ERRORS=$(ruff check . 2>/dev/null | wc -l || echo 0)
          if [ "$TOTAL" -eq 0 ]; then
            PHI=100
          else
            PHI=$(( (TOTAL - ERRORS) * 100 / TOTAL ))
          fi
          echo "value=$PHI" >> $GITHUB_OUTPUT
          echo "Φ = $PHI%"

      - name: "Ψ — Truth"
        id: psi
        run: |
          if [ -f "federation-manifests/manifest.json" ]; then
            python3 -c "
          import json
          m = json.load(open('federation-manifests/manifest.json'))
          tools = len(m.get('tools', []))
          resources = len(m.get('resources', []))
          prompts = len(m.get('prompts', []))
          print(f'Ψ = {tools}T {resources}R {prompts}P')
          print(f'authority = {m.get(\"authority_boundary\", \"UNKNOWN\")}')
          print(f'sha256 = {m.get(\"sha256\", \"none\")[:16]}')
          "
            echo "value=ALIGNED" >> $GITHUB_OUTPUT
          else
            echo "Ψ = NO_MANIFEST"
            echo "value=MISSING" >> $GITHUB_OUTPUT
          fi

      - name: "Ω — Governance"
        id: omega
        run: |
          # Check: no tool claims authority outside manifest
          SELF_AUTH=$(grep -r "self.*authorize\|self.*grant\|self.*approve" --include="*.py" . 2>/dev/null | wc -l)
          CREEP=$(git diff HEAD~1 HEAD --stat 2>/dev/null | grep -c "server.py" || echo 0)
          MANIFEST=$(git diff HEAD~1 HEAD --stat 2>/dev/null | grep -c "manifest" || echo 0)

          if [ "$CREEP" -gt 0 ] && [ "$MANIFEST" -eq 0 ]; then
            echo "value=DRIFT" >> $GITHUB_OUTPUT
            echo "Ω = DRIFT (server changed, manifest unchanged)"
          elif [ "$SELF_AUTH" -gt 0 ]; then
            echo "value=BREACH" >> $GITHUB_OUTPUT
            echo "Ω = BREACH (self-authorization detected)"
          else
            echo "value=LOCKED" >> $GITHUB_OUTPUT
            echo "Ω = LOCKED"
          fi

      - name: Verdict
        run: |
          echo "═══════════════════════════════════════"
          echo "BIJAKSANA REPORT"
          echo "═══════════════════════════════════════"
          echo "ΔS = ${{ steps.ds.outputs.value }}"
          echo "Φ  = ${{ steps.phi.outputs.value }}%"
          echo "Ψ  = ${{ steps.psi.outputs.value }}"
          echo "Ω  = ${{ steps.omega.outputs.value }}"
          echo ""

          DS=${{ steps.ds.outputs.value }}
          PHI=${{ steps.phi.outputs.value }}
          PSI=${{ steps.psi.outputs.value }}
          OMEGA=${{ steps.omega.outputs.value }}

          # Gate logic
          FAIL=0

          # ΔS gate: entropy must not spike
          if [ "$DS" -gt 100 ]; then
            echo "❌ ΔS=$DS (threshold: 100)"
            FAIL=1
          fi

          # Φ gate: clarity must be high
          if [ "$PHI" -lt 80 ]; then
            echo "❌ Φ=$PHI% (threshold: 80%)"
            FAIL=1
          fi

          # Ω gate: governance must be locked
          if [ "$OMEGA" = "BREACH" ]; then
            echo "❌ Ω=BREACH (self-authorization blocked)"
            FAIL=1
          fi

          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "❌ BIJAKSANA FAILED — codebase entropy increased"
            exit 1
          else
            echo ""
            echo "✅ BIJAKSANA PASSED — intelligence maintained"
          fi
