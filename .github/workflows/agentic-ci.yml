name: "🧠 Agentic CI — WELL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: agentic-ci-well-${{ github.ref }}
  cancel-in-progress: true

jobs:

  federation-check:
    name: 🗺️ Federation Check
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - name: Validate FEDERATION.md
        run: |
          test -f FEDERATION.md || (echo "❌ Missing FEDERATION.md" && exit 1)
          grep -q "role: DOMAIN" FEDERATION.md || (echo "❌ FEDERATION.md must declare role: DOMAIN" && exit 1)
          grep -q "layer: L3" FEDERATION.md || (echo "❌ FEDERATION.md must declare layer: L3" && exit 1)
          echo "✅ WELL FEDERATION.md valid — L3 DOMAIN"

  protocol-alignment:
    name: 🧭 Protocol Alignment
    runs-on: ubuntu-latest
    needs: [federation-check]
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v7
      - name: Protocol alignment gate
          if [ -f scripts/check_protocol_alignment.sh ]; then
            bash scripts/check_protocol_alignment.sh
          elif [ -f AAA/scripts/check_protocol_alignment.sh ]; then
            bash AAA/scripts/check_protocol_alignment.sh
      - name: Validate FEDERATION.md contract
        run: |
          test -f FEDERATION.md || (echo "❌ Missing FEDERATION.md" && exit 1)
          grep -q "role: DOMAIN" FEDERATION.md
          grep -q "layer: L3" FEDERATION.md
          echo "✅ WELL FEDERATION.md contract valid — L3 DOMAIN"

  standard:
    name: "Lane 1 — Standard CI"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest tests/ -q --tb=short

  bijaksana:
    name: "Lane 2 — BIJAKSANA ΔS Φ Ψ Ω"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: "ΔS — Entropy (REFLECT_ONLY doctrine)"
        run: |
          DIAGNOSE=$(grep -r "diagnosis\|diagnose\|diagnostic" src/ --include="*.py" 2>/dev/null | grep -v "# \|test_\|__pycache__\|node_modules" | wc -l)
          echo "ΔS (diagnostic claims) = $DIAGNOSE"
          if [ "$DIAGNOSE" -gt 0 ]; then
            echo "⚠️ VIOLATION: WELL is REFLECT_ONLY — found $DIAGNOSE diagnostic claims"
            exit 1
          fi
      - name: "Φ — Clarity (epistemic labels)"
        run: |
          LABELS=$(grep -r "OBS\|DER\|INT\|SPEC" src/ --include="*.py" 2>/dev/null | wc -l)
          echo "Φ (epistemic labels) = $LABELS"
      - name: "Ψ — Truth (tool surface)"
        run: |
          TOOLS=$(grep -r "def well_\|well_assess\|well_validate\|well_guard\|well_check\|well_classify\|well_trace\|well_registry" src/ --include="*.py" 2>/dev/null | wc -l)
          echo "Ψ (WELL tools) = $TOOLS"
      - name: "Ω — Governance (no adjudication)"
        run: |
          ADJUDICATE=$(grep -r "SEAL\|HOLD\|SABAR\|VOID" src/ --include="*.py" 2>/dev/null | grep -v "# \|test_\|__pycache__\|node_modules" | wc -l)
          echo "Ω (adjudication patterns) = $ADJUDICATE"
          if [ "$ADJUDICATE" -gt 0 ]; then
            echo "⚠️ DOMAIN organs must not adjudicate"
          fi

  report:
    name: "📊 Agentic CI Report"
    runs-on: ubuntu-latest
    needs: [standard, bijaksana]
    if: always()
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Generate Report
        run: |
          echo "WELL CI: standard=${{ needs.standard.result }} | bijaksana=${{ needs.bijaksana.result }}"
          echo "Federated CI report generated for WELL (L3 DOMAIN)"
