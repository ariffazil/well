schema_version: 1
organ: well
repo: ariffazil/well
role: domain_evidence
authority_ceiling: REFLECT_ONLY
default_branch: main

interfaces:
  mcp_manifest: contracts/mcp-surface.json
  health_schema: contracts/health.schema.json

owned_domains:
  - human_readiness
  - vitality_reflection
  - boundary_sensing

forbidden_domains:
  - medical_diagnosis
  - medical_prescription
  - constitutional_judgment
  - capital_allocation

build:
  runtime: python-3.12
  install: pip install -e .
  test: pytest tests/ -q --tb=short
  artifact: wheel

rollback:
  strategy: previous_verified_digest

boundary_tests:
  - test_medical_boundary.py  # MUST NOT emit diagnosis — hard block
