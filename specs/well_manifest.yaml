# ── No-Telemetry Invariant ─────────────────────────────────────────────────────
#
# Critical W-Invariant for all readiness tools:
#   WHEN has_telemetry == false
#   THEN human_readiness MUST be UNKNOWN
#   AND human_readiness MUST NOT be: OPTIMAL | GREEN | READY | HIGH
#
# This prevents WELL from fabricating biological confidence.
telemetry_invariant:
  rule_id: W-INV-T1
  condition: has_verified_telemetry == false
  then:
    human_readiness: UNKNOWN
    confidence: LOW
    risk_level: UNKNOWN
    recommended_mode: draft_only
    human_confirmation_required: true
  never:
    - OPTIMAL
    - GREEN
    - READY
    - HIGH
  applies_to:
    - well_validate_vitality
    - well_assess_metabolism
    - well_readiness
    - well_check_repair

# ── Federation Output Schema ───────────────────────────────────────────────────
#
# Every public WELL tool MUST return this schema:
output_schema:
  required_fields:
    - domain
    - authority
    - medical_boundary
    - final_authority
    - evidence_status
    - confidence
    - recommended_mode
    - next_safe_action
  optional_fields:
    - well_score
    - readiness
    - risk_level
    - assumptions
  forbidden_fields:
    - diagnosis
    - prescription
    - BLOCKED (use ADVISORY only)
    - SEAL | HOLD | VOID (arifOS owns constitutional verdicts)

# ── 168-Hard Ceiling ──────────────────────────────────────────────────────────
#
# If state telemetry age > 168 hours:
#   → WELL CANNOT infer human readiness
#   → MUST return DO_NOT_INFER + human_confirmation_required = true
state_age_ceiling_hours: 168
