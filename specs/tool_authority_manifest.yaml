# WELL Tool Authority Manifest v2026.05.12
# schema_version: 2026.05.12
# final_authority: ARIF
# SOT: /root/WELL/tool_authority_manifest.yaml
#
# Every tool declares: can it read? write? mutate? seal? execute? advise?
# This prevents future agents from misusing the surface.
#
# DITEMPA BUKAN DIBERI — Intelligence is forged, not given.

mcp: WELL
schema_version: "2026.05.12"
final_authority: "ARIF"
irreversible_requires_human_ack: true
self_approval_forbidden: true

# ── Heartbeat ──────────────────────────────────────────────────────────────────
heartbeat:
  - tool: mcp_health_check
    type: heartbeat
    mutation: false
    irreversible: false
    requires_ack: false
    description: Federation liveness probe

# ── Canonical 13 Tools (Ω-WELL verb_noun surface) ──────────────────────────────
canonical_tools:
  - tool: well_classify_substrate
    type: reader
    mutation: false
    irreversible: false
    requires_ack: false
    description: "Ω-01: Substrate classification + session bootstrap (modes: init|assert|bootstrap|classify|boundary|scan)"

  - tool: well_trace_lineage
    type: reader
    mutation: false
    irreversible: false
    requires_ack: false
    description: "Ω-02: Memory, trend, ledger, and vault chain tracing (modes: recall|trend|context|ledger|chain)"

  - tool: well_detect_boundary
    type: reader
    mutation: false
    irreversible: false
    requires_ack: false
    description: "Ω-03: Boundary detection + federation A2A gateway (modes: classify|boundary|scan|status|connect|handoff|manifest)"

  - tool: well_measure_gradient
    type: reader
    mutation: false
    irreversible: false
    requires_ack: false
    description: "Ω-04: Evidence/energy gradient measurement (modes: evidence|quality|ingest)"

  - tool: well_assess_metabolism
    type: reflector
    mutation: false
    irreversible: false
    requires_ack: false
    description: "Ω-05: Substrate metabolism/throughput assessment (modes: human|machine|coupled|bio|material|institution|info|symbolic)"

  - tool: well_assess_homeostasis
    type: reflector
    mutation: false
    irreversible: false
    requires_ack: false
    description: "Ω-06: Regulation, empathy, dignity critique (modes: critique|empathize|dignity|redteam|maruah)"

  - tool: well_check_repair
    type: reflector
    mutation: false
    irreversible: false
    requires_ack: false
    description: "Ω-07: Forge coupling, recovery, pressure, closeout (modes: precheck|mode|bandwidth|pressure|closeout)"

  - tool: well_validate_vitality
    type: guard
    mutation: false
    irreversible: false
    requires_ack: false
    description: "Ω-08: Readiness, classification, NIAT, coupled, floors (modes: readiness|classify|niat|coupled|floors)"

  - tool: well_assess_livelihood
    type: reflector
    mutation: false
    irreversible: false
    requires_ack: false
    description: "Ω-09: Human wellness, role, dignity, meaning (modes: human|machine|coupled|bio|material|institution|info|symbolic)"

  - tool: well_assess_reliability
    type: reader
    mutation: false
    irreversible: false
    requires_ack: false
    description: "Ω-10: Machine/tool/infra reliability + medical boundary (modes: health|consent|medical|vitals)"

  # REMOVED per orthogonal MCP alignment (2026-05-14):
  # well_reflect_intelligence  → REFLECT/routing (arifOS 444_KERNEL)
  # well_guard_dignity         → CRITIQUE/meaning (arifOS 666_HEART)
  # well_anchor_evidence       → SEAL/vault (arifOS 999_VAULT)
  # These tools are now autonomic-only (not on public MCP surface).

