# ── Danger Taxonomy ────────────────────────────────────────────────────────────
danger_taxonomy:
  L3:
    description: "vault seal / floor check — fail-closed mandatory (arifOS only)"
    tools: [well_seal_vault, well_request_anchor, well_check_floor]
  L2:
    description: "session / log / assess / repair — fail-open with constraint"
    tools: [well_validate_vitality, well_check_repair, well_assess_metabolism, well_assess_homeostasis, well_assess_livelihood, well_assess_reliability]
  L1:
    description: "observe / health / readiness / trace — fail-open with constraint"
    tools: [well_classify_substrate, well_trace_lineage, well_detect_boundary, well_measure_gradient, mcp_health_check]
